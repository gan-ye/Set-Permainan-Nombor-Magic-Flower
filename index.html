<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学闪卡生成器 / Math Flashcards</title>
    <style>
        body {
            /* 重点在这里：按钮的英文字体改成 Comic Sans，中文改成楷体 */
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f6f9;
        }

        /* 开始界面的样式 */
        #start-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        /* 游戏界面的样式 */
        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* 卡片容器 */
        .cards-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* 卡片之间的间距 */
            margin-bottom: 40px;
            width: 90%;
            max-width: 1200px;
        }

        /* 卡片包装器，用于重叠覆盖层和图片 */
        .card-wrapper {
            position: relative;
            width: 18%; /* 让5个包装器均匀分布 */
            max-width: 200px;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden; /* 隐藏超出部分，保持形状 */
        }

        /* 隐藏 underneath 的图片样式 */
        .card-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 深灰色覆盖层样式 */
        .card-cover {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #444; /* 深灰色 */
            cursor: pointer;
            z-index: 10; /* 在图片上方 */
            display: block; /* 初始显示 */
            transition: opacity 0.3s ease; /* 增加一个漂亮的渐变消失效果 */
        }

        /* 当覆盖层被点击后消失的样式 */
        .card-cover.revealed {
            opacity: 0;
            pointer-events: none; /* 让鼠标无法再点击它 */
        }

        /* 按钮通用样式 */
        button {
            /* 应用英文字体 Comic Sans 和中文字体楷体 */
            font-family: 'Comic Sans MS', 'Comic Sans', '楷体', 'KaiTi', 'STKaiti', sans-serif;
            
            background-color: #d30d23;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 20px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1.5;
            text-align: center;
            box-shadow: 0 6px 0 #852627;
            transition: all 0.1s ease;
        }

        button:active {
            box-shadow: 0 2px 0 #2E7D32;
            transform: translateY(4px);
        }

        /* 响应式设计：手机屏幕适配 */
        @media (max-width: 768px) {
            .cards-container {
                gap: 5px;
            }
            button {
                font-size: 18px;
                padding: 15px 30px;
            }
        }
    </style>
</head>
<body>

    <audio id="click-sound" src="./sound.MP3" preload="auto"></audio>

    <div id="start-screen">
        <button id="start-btn" onclick="startGame()">
            mula<br>start<br>开始
        </button>
    </div>

    <div id="game-screen">
        <div class="cards-container">
            <div class="card-wrapper" id="wrapper-1">
                <div class="card-cover" onclick="revealSingleCard(0)"></div>
                <img id="card-num1" src="" alt="数字1">
            </div>
            <div class="card-wrapper" id="wrapper-2">
                <div class="card-cover" onclick="revealSingleCard(1)"></div>
                <img id="card-operator" src="" alt="符号">
            </div>
            <div class="card-wrapper" id="wrapper-3">
                <div class="card-cover" onclick="revealThirdCard(2)"></div>
                <img id="card-num2" src="" alt="数字2">
            </div>
            <div class="card-wrapper" id="wrapper-4">
                <div class="card-cover"></div> <img id="card-equal" src="equal.jpg" alt="等号">
            </div>
            <div class="card-wrapper" id="wrapper-5">
                <div class="card-cover"></div> <img id="card-blank" src="blank.jpg" alt="空白">
            </div>
        </div>
        
        <button id="next-btn" onclick="generateQuestion()">
            soalan seterusnya<br>next question<br>下一题
        </button>
    </div>

    <script>
        const audio = document.getElementById('click-sound');
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        
        const cardNum1 = document.getElementById('card-num1');
        const cardOperator = document.getElementById('card-operator');
        const cardNum2 = document.getElementById('card-num2');

        // 获取所有的覆盖层元素，方便控制
        const cardCovers = document.querySelectorAll('.card-cover');

        // 播放音效的函数
        function playSound() {
            audio.currentTime = 0; 
            audio.play().catch(error => {
                console.log("浏览器可能拦截了自动播放音效，需用户互动后生效。");
            });
        }

       // 按下开始按钮
        function startGame() {
            // 针对某些严格的移动端浏览器，在第一次用户交互时强制加载和播放
            audio.load(); 
            playSound();
            
            startScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            generateQuestion();
        }

        // 按下“下一题”按钮时的核心逻辑：重置和生成新题
        function generateQuestion() {
            playSound();
            
            // 重点修改1：每次生成新题时，将所有卡片重新“盖上”
            cardCovers.forEach(cover => {
                cover.classList.remove('revealed');
            });

            // 重点修改2：和之前一样的数学逻辑生成题目
            generateMathData();
        }

        // 卡片点击：点击第1、2张卡片时的单张显示
        function revealSingleCard(index) {
            playSound();
            cardCovers[index].classList.add('revealed');
        }

        // 卡片点击：点击第3张卡片时的特殊逻辑
        // 一次点击，同时显示第3, 4, 5张卡片
        function revealThirdCard(index) {
            playSound();
            cardCovers[index].classList.add('revealed');   // 第3张 (num2)
            cardCovers[index + 1].classList.add('revealed'); // 第4张 (equal)
            cardCovers[index + 2].classList.add('revealed'); // 第5张 (blank)
        }

        // 随机生成数学题的数据（保持之前的逻辑不变）
        function generateMathData() {
            let isAddition = Math.random() >= 0.5;
            let num1, num2;

            if (isAddition) {
                do {
                    num1 = Math.floor(Math.random() * 11); // 0-10
                    num2 = Math.floor(Math.random() * 11); // 0-10
                } while (num1 + num2 > 18);
                cardOperator.src = "plus.jpg";
            } else {
                num1 = Math.floor(Math.random() * 11); // 0-10
                num2 = Math.floor(Math.random() * (num1 + 1)); // 0-num1
                cardOperator.src = "minus.jpg";
            }

            cardNum1.src = num1 + ".jpg";
            cardNum2.src = num2 + ".jpg";
        }
    </script>
</body>
</html>
